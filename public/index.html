<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vietravel English Placement Test</title>
<link rel="stylesheet" href="/tailwind-built.css">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Be Vietnam Pro', sans-serif; }
  .hero-video { position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.15; }
  .glass { background:rgba(255,255,255,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px); }
</style>
</head>
<body class="min-h-screen relative overflow-hidden">

  <!-- Image background -->
  <div class="hero-video" style="background:url('https://images.pexels.com/photos/6711283/pexels-photo-6711283.jpeg') center/cover no-repeat;opacity:1;"></div>

  <!-- Gradient overlay -->
  <div class="absolute inset-0 bg-gradient-to-br from-blue-900/60 via-blue-800/40 to-indigo-900/60"></div>

  <!-- Content -->
  <div class="relative z-10 min-h-screen flex items-center justify-center p-6">
    <div class="glass rounded-3xl shadow-2xl p-10 max-w-lg w-full text-center border border-white/20">

      <!-- Logo -->
      <img src="/logo-vietravel.svg" alt="Vietravel" class="h-14 mx-auto mb-6">

      <!-- Status badge -->
      <div class="inline-flex items-center gap-2 px-4 py-2 bg-emerald-50 text-emerald-700 rounded-full text-xs font-bold mb-6">
        <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
        Hệ thống đang hoạt động
      </div>

      <h1 class="text-3xl font-black text-gray-800 mb-2">English Placement Test</h1>
      <p class="text-gray-500 text-sm mb-8">Bài kiểm tra năng lực tiếng Anh · Tuyển dụng 2026</p>

      <div class="flex flex-col sm:flex-row gap-3 justify-center">
        <a href="/exam/" class="px-6 py-3 rounded-xl font-bold text-white text-sm transition hover:-translate-y-0.5 hover:shadow-lg"
           style="background:linear-gradient(135deg,#1a4b8c,#2E75B6)">
          📝 Vào làm bài thi
        </a>
        <a href="/admin/login.html" class="px-6 py-3 rounded-xl font-bold text-gray-700 text-sm border border-gray-200 bg-white hover:bg-gray-50 transition">
          🔐 Admin Dashboard
        </a>
      </div>

      <footer class="mt-8 text-[11px] text-gray-400 font-medium space-y-0.5">
        <div>Bài tập trên nền tảng được phát triển bởi MM Publications Vietnam</div>
        <div class="text-[9px] text-gray-350">Hệ thống phát triển bởi tranlong@cdimex.com.vn</div>
        <div class="pt-2 text-xs">© 2026 Vietravel · Your Journey - Your Value</div>
      </footer>
    </div>
  </div>
</body>
</html>
